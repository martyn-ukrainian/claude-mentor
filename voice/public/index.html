<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Agent — Mock Interview (P2P WebRTC)</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        background: #0f1115;
        color: #e8e8e8;
        min-height: 100vh;
      }
      .container { max-width: 760px; margin: 0 auto; }
      h1 { font-weight: 600; margin: 0 0 8px; }
      .muted { color: #8a8f98; font-size: 14px; margin-bottom: 24px; }
      .panel {
        background: #1a1d24;
        border: 1px solid #2a2e38;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
      }
      textarea, input {
        width: 100%;
        background: #0f1115;
        border: 1px solid #2a2e38;
        color: #e8e8e8;
        padding: 10px 12px;
        border-radius: 8px;
        font: inherit;
        font-size: 14px;
      }
      textarea { min-height: 120px; resize: vertical; font-family: ui-monospace, monospace; }
      label { display: block; font-size: 13px; color: #8a8f98; margin: 12px 0 6px; }
      button {
        background: #3b82f6;
        color: white;
        border: 0;
        padding: 12px 20px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 16px;
      }
      button:hover { background: #2563eb; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.danger { background: #ef4444; }
      button.danger:hover { background: #dc2626; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .status {
        font-size: 13px;
        color: #8a8f98;
        margin-top: 12px;
        padding: 8px 12px;
        background: #0f1115;
        border-radius: 6px;
        font-family: ui-monospace, monospace;
      }
      .status.ok { color: #10b981; }
      .status.err { color: #ef4444; }
      code { background: #0f1115; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
      .indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #6b7280;
        margin-right: 8px;
      }
      .indicator.connected { background: #10b981; box-shadow: 0 0 8px #10b981; }
      .indicator.speaking { background: #3b82f6; animation: pulse 1s infinite; }
      @keyframes pulse { 50% { opacity: 0.3; } }
      #transcript {
        margin-top: 16px;
        max-height: 400px;
        overflow-y: auto;
        padding: 12px;
        background: #0f1115;
        border-radius: 8px;
        font-size: 14px;
        line-height: 1.5;
      }
      .msg { margin-bottom: 10px; }
      .msg .role {
        display: inline-block;
        font-size: 11px;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 4px;
        margin-right: 8px;
        font-weight: 600;
      }
      .msg.assistant .role { background: #1e3a8a; color: #93c5fd; }
      .msg.user .role { background: #065f46; color: #6ee7b7; }
      .msg.system .role { background: #374151; color: #9ca3af; font-style: italic; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎙️ Voice Agent</h1>
      <div class="muted">
        Локальний mock-interviewer. P2P WebRTC через pipecat SmallWebRTCTransport — нуль зовнішніх сервісів для transport.
      </div>

      <div class="panel" id="setup">
        <label>Flow file (опціонально — підставляє system prompt)</label>
        <div class="row">
          <select id="flowSelect" style="flex: 1; min-width: 200px;">
            <option value="">— без flow (ручний prompt) —</option>
          </select>
          <button
            type="button"
            style="margin-top: 0; padding: 10px 14px; background: #374151;"
            onclick="loadFlow(document.getElementById('flowSelect').value)"
          >Завантажити</button>
        </div>

        <label>System prompt (залиш пустим для дефолтного)</label>
        <textarea id="prompt" placeholder="Ти — hiring manager з Osavul. Постав 5 питань про LLM production..."></textarea>

        <div class="row">
          <div style="flex: 1; min-width: 200px;">
            <label>Bot name</label>
            <input id="botName" value="Interviewer" />
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label>Voice ID (Cartesia)</label>
            <input id="voiceId" value="05ffab9c-d380-4909-8375-cd12f59238c3" />
          </div>
        </div>

        <label>Мова (STT/TTS)</label>
        <select id="languageMode" style="width: 100%;">
          <option value="uk">Українська тільки (Deepgram nova-2, Cartesia UK lock)</option>
          <option value="multi">Мультимовна auto-detect (Deepgram nova-3 multi, Cartesia auto)</option>
        </select>

        <button id="startBtn" onclick="connect()">▶ Почати інтерв'ю</button>
        <div class="status" id="status"><span class="indicator"></span>idle</div>
      </div>

      <div class="panel" id="callPanel" style="display: none;">
        <div class="row" style="justify-content: space-between;">
          <div id="sessionInfo" class="muted"></div>
          <button class="danger" onclick="disconnect()">■ Завершити</button>
        </div>
        <audio id="audio" autoplay playsinline></audio>
        <div id="transcript"></div>
      </div>
    </div>

    <script>
      let pc = null;
      let sessionId = null;
      let transcriptStream = null;
      const audioEl = document.getElementById('audio');
      const statusEl = document.getElementById('status');
      const transcriptEl = document.getElementById('transcript');

      function appendTranscript(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `<span class="role">${role}</span><span></span>`;
        div.querySelector('span:last-child').textContent = text;
        transcriptEl.appendChild(div);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      function openTranscriptStream(sid) {
        if (transcriptStream) transcriptStream.close();
        transcriptStream = new EventSource(`/api/stream/${sid}`);
        transcriptStream.onmessage = (e) => {
          try {
            const m = JSON.parse(e.data);
            appendTranscript(m.role, m.text);
          } catch {}
        };
        transcriptStream.onerror = () => console.warn('SSE error, reconnecting...');
      }

      async function populateFlows() {
        try {
          const res = await fetch('/api/flows');
          const data = await res.json();
          const sel = document.getElementById('flowSelect');
          for (const name of data.flows || []) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
          }
        } catch (e) {
          console.warn('flows list failed:', e);
        }
      }

      async function loadFlow(name) {
        if (!name) return;
        const res = await fetch(`/api/flows/${encodeURIComponent(name)}`);
        if (!res.ok) {
          setStatus(`❌ flow '${name}' не знайдено`, 'err');
          return;
        }
        const data = await res.json();
        document.getElementById('prompt').value = data.system_prompt;
        document.getElementById('flowSelect').value = name;
        setStatus(`flow '${name}' завантажено`);
      }

      async function bootFromUrl() {
        await populateFlows();
        const params = new URLSearchParams(location.search);
        const lang = params.get('lang');
        if (lang === 'multi' || lang === 'uk') {
          document.getElementById('languageMode').value = lang;
        }
        const flow = params.get('flow');
        if (flow) await loadFlow(flow);
        const forcedSession = params.get('session');
        if (forcedSession) sessionId = forcedSession;
        if (params.get('autostart') === '1') await connect();
      }

      function setStatus(text, cls = '') {
        statusEl.className = `status ${cls}`;
        statusEl.innerHTML = `<span class="indicator ${cls === 'ok' ? 'connected' : ''}"></span>${text}`;
      }

      async function sendIce(candidate) {
        await fetch('/api/offer', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pc_id: pc.pc_id,
            candidates: [{
              candidate: candidate.candidate,
              sdp_mid: candidate.sdpMid,
              sdp_mline_index: candidate.sdpMLineIndex,
            }],
          }),
        });
      }

      async function connect() {
        document.getElementById('startBtn').disabled = true;
        setStatus('отримую мікрофон…');

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

          pc = new RTCPeerConnection({
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
          });
          pc.pendingIce = [];
          pc.canSendIce = false;

          pc.ontrack = (e) => { audioEl.srcObject = e.streams[0]; };

          pc.onconnectionstatechange = () => {
            const s = pc.connectionState;
            console.log('connection state:', s);
            if (s === 'connected') {
              setStatus('з\'єднано — слухаю', 'ok');
              document.getElementById('setup').style.display = 'none';
              document.getElementById('callPanel').style.display = 'block';
              document.getElementById('sessionInfo').innerHTML =
                `Session: <code>${sessionId.slice(0, 8)}</code> · Transcript: <code>transcripts/${sessionId}.json</code>`;
            } else if (s === 'failed' || s === 'closed') {
              setStatus('з\'єднання розірване', 'err');
            }
          };

          pc.onicecandidate = async (event) => {
            if (!event.candidate) return;
            if (pc.canSendIce && pc.pc_id) {
              await sendIce(event.candidate);
            } else {
              pc.pendingIce.push(event.candidate);
            }
          };

          // pipecat SmallWebRTCTransport очікує обидва transceivers
          pc.addTransceiver(stream.getAudioTracks()[0], { direction: 'sendrecv' });
          pc.addTransceiver('video', { direction: 'sendrecv' });

          await pc.setLocalDescription(await pc.createOffer());

          setStatus('sending offer…');
          if (!sessionId) sessionId = crypto.randomUUID();
          const res = await fetch('/api/offer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              sdp: pc.localDescription.sdp,
              type: pc.localDescription.type,
              request_data: {
                session_id: sessionId,
                system_prompt: document.getElementById('prompt').value || undefined,
                voice_id: document.getElementById('voiceId').value || undefined,
                bot_name: document.getElementById('botName').value || undefined,
                language_mode: document.getElementById('languageMode').value || 'uk',
              },
            }),
          });
          if (!res.ok) throw new Error(`offer failed: ${res.status}`);
          const answer = await res.json();
          pc.pc_id = answer.pc_id;
          if (answer.session_id) sessionId = answer.session_id;
          openTranscriptStream(sessionId);

          await pc.setRemoteDescription(answer);
          pc.canSendIce = true;
          for (const c of pc.pendingIce) await sendIce(c);
          pc.pendingIce = [];

          setStatus('очікую на агента…');
        } catch (e) {
          console.error(e);
          setStatus(`❌ ${e.message}`, 'err');
          document.getElementById('startBtn').disabled = false;
        }
      }

      window.addEventListener('DOMContentLoaded', bootFromUrl);

      function disconnect() {
        if (transcriptStream) {
          transcriptStream.close();
          transcriptStream = null;
        }
        if (pc) {
          pc.close();
          pc = null;
        }
        audioEl.srcObject = null;
        document.getElementById('callPanel').style.display = 'none';
        document.getElementById('setup').style.display = 'block';
        document.getElementById('startBtn').disabled = false;
        setStatus(
          sessionId
            ? `✅ Сесія ${sessionId.slice(0, 8)} завершена. Transcript: transcripts/${sessionId}.json`
            : 'idle',
        );
      }
    </script>
  </body>
</html>
